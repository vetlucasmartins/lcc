name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # lcc never fetches tokenizer assets at runtime (ADR 0008). We pre-populate a local
    # tiktoken cache here as an explicit, one-time setup step so the exact-mode benchmark
    # cases and tests can verify *exact* counting offline; lcc reads from this cache and
    # never downloads on its own.
    env:
      TIKTOKEN_CACHE_DIR: ${{ github.workspace }}/.tiktoken-cache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pre-cache tiktoken encodings (explicit setup; enables exact-mode tests offline)
        run: python -c "import tiktoken; tiktoken.encoding_for_model('gpt-4.1'); tiktoken.get_encoding('cl100k_base')"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: python -m pytest
