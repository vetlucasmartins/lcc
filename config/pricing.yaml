# Example model pricing for lcc cost estimation.
#
# IMPORTANT: these are EDITABLE EXAMPLE values, NOT guaranteed current prices.
# Always verify against your provider's official pricing page before relying on
# the cost output. Prices are expressed in USD per 1,000,000 tokens.
#
# Use with:  lcc optimize input.txt --pricing config/pricing.yaml

currency: USD
unit: per_million_tokens
source: "config/pricing.yaml (example values - edit me)"

models:
  gpt-4.1:
    input: 2.00
    output: 8.00
  gpt-4.1-mini:
    input: 0.40
    output: 1.60
  gpt-4.1-nano:
    input: 0.10
    output: 0.40
  gpt-4o:
    input: 2.50
    output: 10.00
  gpt-4o-mini:
    input: 0.15
    output: 0.60
